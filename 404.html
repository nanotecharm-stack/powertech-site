<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>PowerTech — скоро</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root{ --milk:#F5F4F0; --ink:#1B1B1B; --mid:#4A4A4A; --soft:#6E6E6E; --coral:#C8603D; --line:#DAD6CD; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--milk); color:var(--ink);
    font-family:'Instrument Sans','IBM Plex Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; padding:32px;
  }
  .wrap{ max-width:560px; width:100%; text-align:left; }
  .brand{ font-size:22px; font-weight:700; letter-spacing:-.4px; margin:0 0 40px; }
  .brand .p{ color:var(--ink); } .brand .t{ color:var(--coral); }
  .rule{ width:40px; height:2px; background:var(--coral); margin:0 0 26px; }
  h1{ font-size:clamp(30px,6vw,46px); font-weight:600; letter-spacing:-1.4px; line-height:1.08; margin:0 0 20px; }
  .sub{ font-size:16px; line-height:1.65; color:var(--mid); margin:0 0 8px; }
  .langs{ font-size:14px; color:var(--soft); margin:0 0 40px; }
  .contact{ font-size:14px; color:var(--soft); }
  .contact a{ color:var(--coral); text-decoration:none; border-bottom:1px solid rgba(200,96,61,.35); }
  .contact a:hover{ border-bottom-color:var(--coral); }
  .foot{ margin-top:56px; font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#A8A399; }
</style>
</head>
<body>
  <main class="wrap">
    <p class="brand"><span class="p">Power</span><span class="t">Tech</span></p>
    <div class="rule"></div>
    <h1>Сайт скоро откроется</h1>
    <p class="sub">Мониторинг качества электроэнергии — Армения. Мы готовим обновлённую версию сайта.</p>
    <p class="langs">Կայքը շուտով կբացվի · Launching soon</p>
    <p class="contact">По вопросам: <a href="mailto:sales@powertech.am">sales@powertech.am</a></p>
    <p class="foot">PowerTech · Երևան</p>
  </main>
</body>
</html>
