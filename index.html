<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>PowerTech — coming soon</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root{ --milk:#F5F4F0; --ink:#1B1B1B; --mid:#4A4A4A; --soft:#6E6E6E; --coral:#C8603D; }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--milk); color:var(--ink);
    font-family:'Instrument Sans','IBM Plex Sans',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center; padding:32px;
  }
  .wrap{ max-width:560px; width:100%; text-align:left; }
  .logo{ display:inline-flex; align-items:center; gap:12px; margin:0 0 42px; }
  .logo svg{ width:46px; height:46px; display:block; }
  .logo .wm{ font-size:23px; font-weight:700; letter-spacing:-.4px; }
  .logo .wm .p{ color:var(--ink); } .logo .wm .t{ color:var(--coral); font-style:normal; }
  .rule{ width:40px; height:2px; background:var(--coral); margin:0 0 26px; }
  h1{ font-size:clamp(30px,6vw,46px); font-weight:600; letter-spacing:-1.4px; line-height:1.08; margin:0 0 20px; }
  .sub{ font-size:16px; line-height:1.65; color:var(--mid); margin:0 0 36px; max-width:44ch; }
  .contact{ font-size:14.5px; color:var(--soft); }
  .contact a{ color:var(--coral); text-decoration:none; border-bottom:1px solid rgba(200,96,61,.35); }
  .contact a:hover{ border-bottom-color:var(--coral); }
</style>
</head>
<body>
  <main class="wrap">
    <span class="logo">
      <svg viewBox="-12 -12 184 184" fill="none" aria-hidden="true">
        <defs>
          <linearGradient id="ptg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#D06A43"/>
            <stop offset="1" stop-color="#A6421D"/>
          </linearGradient>
          <filter id="ptl" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#201E1D" flood-opacity="0.28"/>
          </filter>
        </defs>
        <rect width="160" height="160" fill="url(#ptg)" filter="url(#ptl)"/>
        <rect x="1" y="1" width="158" height="158" stroke="#FFFFFF" stroke-opacity="0.28" stroke-width="2"/>
        <path d="M24,83 C44,35 60,35 80,83 S116,131 136,83" stroke="#000000" stroke-opacity="0.2" stroke-width="13" stroke-linecap="round"/>
        <path d="M24,80 C44,32 60,32 80,80 S116,128 136,80" stroke="#F7F5F4" stroke-width="13" stroke-linecap="round"/>
      </svg>
      <span class="wm"><span class="p">Power</span><i class="t">Tech</i></span>
    </span>
    <div class="rule"></div>
    <h1>Coming soon</h1>
    <p class="sub">Power quality monitoring in Armenia. We are preparing an updated version of our website.</p>
    <p class="contact">Get in touch: <a href="mailto:sales@powertech.am">sales@powertech.am</a></p>
  </main>
</body>
</html>
